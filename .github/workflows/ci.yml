name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - uses: extractions/setup-just@v2
    - run: just fmt-check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: extractions/setup-just@v2
    - run: just clippy

  test:
    name: Test (unit + snapshot)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: extractions/setup-just@v2
    - run: just test

  test_integration:
    name: Test (wasm-bindgen integration)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - uses: extractions/setup-just@v2
    # `just test-integration` invokes the wasm-bindgen-test-runner that
    # ships with `wasm-bindgen-cli`. Install at the lockfile-pinned version
    # so the schema matches the wasm-bindgen crate version.
    - uses: taiki-e/install-action@v2
      with:
        tool: wasm-bindgen-cli@0.2.120
    - run: just test-integration
